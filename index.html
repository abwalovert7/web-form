<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
       <h1 class="title center">Parent Teacher Coference Form</h1> 
       <p class="decription center">Please fill out the form below to help schedule your parent-teacher conference.</p>
       <form action="">
        <fieldset>
            <legend>Student Information</legend>
            <label for="student-name">Full Name: </label>
            <input type="text" id="student-name" placeholder="E.g., Jane Doe" required>
            <label for="grade">Student Grade: </label>
            <input type="nuber" id="grade" placeholder="E.g., 4" required>
        </fieldset>
        <fieldset>
            <legend>Parent/Guadian Information</legend>
            <label for="parent">Parent/Guardian Name:</label>
            <input type="text" id="parent" placeholder="E.g, Nancy Doe">

        </fieldset>
        <fieldset>
            <legend>Preferred Contact Method</legend>
            <label for="email" class="contact-method">Email: </label>
            <input type="radio" id="email" name="choose" value="email" class="contact-method-radio-btn" checked>
            <label for="phone" class="contact-method">Phone: </label>
            <input type="radio" id="phone" name="choose" value="email" class="contact-method-radio-btn">
        </fieldset>
        <fieldset>
            <legend>Additionnal Notes</legend>
            <label for="notes">Any specific concerns or topics you'd like to discuss?</label>
            <textarea name="notes" id="notes" rows="4" cols="50"></textarea>
        </fieldset>
        <button type="submit" class="submit-btn">Submit</button>
       </form>
    </main>
</body>
</html>
